<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }

  .banner {
    width: 728px;
    height: 370px;
    background: #0e0e0e;
    border: 1.5px solid #2a2a2a;
    position: relative;
    overflow: hidden;
    font-family: 'DM Mono', monospace;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .amber-glow {
    position: absolute;
    top: -80px;
    left: 50%;
    transform: translateX(-50%);
    width: 500px;
    height: 300px;
    background: radial-gradient(ellipse, rgba(239,159,39,0.18) 0%, transparent 70%);
    pointer-events: none;
  }

  .pig-figure {
    position: absolute;
    right: 60px;
    bottom: 0;
    width: 200px;
    height: 280px;
  }

  .label-tag {
    position: absolute;
    top: 28px;
    left: 36px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: #BA7517;
    text-transform: uppercase;
    border: 1px solid #BA7517;
    padding: 4px 10px;
  }

  .main-content {
    position: relative;
    z-index: 2;
    padding: 0 36px 36px;
  }

  .headline {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 900;
    line-height: 1.0;
    color: #f5e6c8;
    margin-bottom: 12px;
    max-width: 480px;
  }

  .headline em {
    font-style: italic;
    color: #EF9F27;
  }

  .subline {
    font-size: 11px;
    letter-spacing: 0.18em;
    color: #888780;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .cta-row {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .cta-btn {
    background: #EF9F27;
    color: #0e0e0e;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 500;
    padding: 10px 22px;
    border: none;
    cursor: pointer;
    transition: background 0.2s;
  }

  .cta-btn:hover { background: #FAC775; }

  .since-line {
    font-size: 11px;
    color: #5F5E5A;
    letter-spacing: 0.08em;
  }

  .since-line span {
    color: #BA7517;
  }

  .corner-mark {
    position: absolute;
    top: 24px;
    right: 36px;
    font-size: 10px;
    color: #2C2C2A;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .horiz-rule {
    position: absolute;
    left: 36px;
    right: 36px;
    top: 72px;
    height: 0.5px;
    background: #2a2a2a;
  }

  .feed-trough {
    position: absolute;
    bottom: 0;
    right: 30px;
  }
</style>
</head>
<body>

<div class="banner">
  <div class="grid-bg"></div>
  <div class="amber-glow"></div>

  <div class="label-tag">Artificial Intelligence</div>
  <div class="corner-mark">Est. ∞ BC</div>
  <div class="horiz-rule"></div>

  <!-- SVG illustration -->
  <div class="pig-figure">
    <svg viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg" width="200" height="280">
      <!-- Trough -->
      <rect x="30" y="230" width="140" height="38" rx="4" fill="#1a1208" stroke="#BA7517" stroke-width="1"/>
      <rect x="36" y="236" width="128" height="24" rx="2" fill="#0e0d08"/>
      <!-- slop in trough -->
      <ellipse cx="100" cy="248" rx="54" ry="8" fill="#3B2E08" opacity="0.9"/>
      <ellipse cx="85" cy="247" rx="14" ry="5" fill="#5a4610" opacity="0.7"/>
      <ellipse cx="115" cy="249" rx="10" ry="4" fill="#4a3a0e" opacity="0.7"/>
      <!-- drips -->
      <path d="M80 230 Q82 222 80 218" stroke="#3B2E08" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M100 230 Q102 220 100 215" stroke="#3B2E08" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M120 230 Q119 223 121 219" stroke="#3B2E08" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- Pig body -->
      <ellipse cx="100" cy="175" rx="52" ry="42" fill="#D4A97A"/>
      <!-- Pig head -->
      <ellipse cx="100" cy="125" rx="40" ry="36" fill="#D4A97A"/>
      <!-- Ears -->
      <ellipse cx="72" cy="100" rx="14" ry="18" fill="#D4A97A" transform="rotate(-15 72 100)"/>
      <ellipse cx="128" cy="100" rx="14" ry="18" fill="#D4A97A" transform="rotate(15 128 100)"/>
      <ellipse cx="73" cy="102" rx="9" ry="12" fill="#C8847A" transform="rotate(-15 73 102)"/>
      <ellipse cx="127" cy="102" rx="9" ry="12" fill="#C8847A" transform="rotate(15 127 102)"/>
      <!-- Snout -->
      <ellipse cx="100" cy="148" rx="20" ry="15" fill="#C8847A"/>
      <circle cx="93" cy="150" r="5" fill="#8B4A4A"/>
      <circle cx="107" cy="150" r="5" fill="#8B4A4A"/>
      <!-- Eyes -->
      <ellipse cx="86" cy="120" rx="7" ry="8" fill="#FAE8D0"/>
      <ellipse cx="114" cy="120" rx="7" ry="8" fill="#FAE8D0"/>
      <circle cx="87" cy="121" r="4" fill="#1a0a00"/>
      <circle cx="115" cy="121" r="4" fill="#1a0a00"/>
      <circle cx="88" cy="119" r="1.5" fill="white"/>
      <circle cx="116" cy="119" r="1.5" fill="white"/>
      <!-- Legs -->
      <rect x="68" y="205" width="22" height="32" rx="8" fill="#C8847A"/>
      <rect x="110" y="205" width="22" height="32" rx="8" fill="#C8847A"/>
      <!-- Tail -->
      <path d="M148 165 Q170 155 162 140 Q155 125 168 118" stroke="#C8847A" stroke-width="5" fill="none" stroke-linecap="round"/>
      <!-- Circuit overlay on pig -->
      <line x1="100" y1="165" x2="120" y2="165" stroke="#EF9F27" stroke-width="0.7" opacity="0.6"/>
      <line x1="120" y1="165" x2="120" y2="180" stroke="#EF9F27" stroke-width="0.7" opacity="0.6"/>
      <circle cx="120" cy="180" r="2.5" fill="none" stroke="#EF9F27" stroke-width="0.7" opacity="0.6"/>
      <line x1="80" y1="170" x2="62" y2="170" stroke="#EF9F27" stroke-width="0.7" opacity="0.6"/>
      <line x1="62" y1="170" x2="62" y2="185" stroke="#EF9F27" stroke-width="0.7" opacity="0.6"/>
      <circle cx="62" cy="185" r="2.5" fill="none" stroke="#EF9F27" stroke-width="0.7" opacity="0.6"/>
      <rect x="91" y="160" width="18" height="10" rx="2" fill="none" stroke="#EF9F27" stroke-width="0.8" opacity="0.5"/>
    </svg>
  </div>

  <div class="main-content">
    <div class="subline">A new era of sustenance</div>
    <div class="headline">
      <em>Slop</em>:<br>
      Keeping animals<br>fed since the<br>beginning of time
    </div>
    <div class="cta-row">
      <button class="cta-btn">Learn More ↗</button>
      <div class="since-line">Powered by <span>Artificial Intelligence</span></div>
    </div>
  </div>
</div>

</body>
</html>
